<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TradeLog Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="app-card">
        <header>
            <div class="header-top">
                <h1>TradeLog <span class="pro-badge">PRO</span></h1>
                <button onclick="clearJournal()" class="icon-btn">✕</button>
            </div>
            
            <div class="stats-container">
                <div class="main-stat">
                    <span class="label">Net Profit</span>
                    <span id="total-pnl" class="value">$0</span>
                </div>
                <div class="stats-subgrid">
                    <div class="stat-item">
                        <span class="label">Win Rate</span>
                        <span id="win-rate" class="sub-value">0%</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">Trades</span>
                        <span id="total-count" class="sub-value">0</span>
                    </div>
                </div>
            </div>
        </header>

        <section class="calendar-section">
            <span class="label">Activity (Last 14 Days)</span>
            <div id="activity-calendar" class="calendar-grid"></div>
        </section>

        <section class="input-section">
            <div class="input-row">
                <input type="text" id="pair" placeholder="Asset (BTC/USD)">
                <input type="number" id="pnl" placeholder="P&L ($)">
            </div>
            <div class="input-row">
                <select id="prop-firm">
                    <option value="Personal">🏦 Personal</option>
                    <option value="FTMO">💎 FTMO</option>
                    <option value="Topstep">📈 Topstep</option>
                    <option value="Apex">🏹 Apex</option>
                    <option value="FundingPips">💧 FundingPips</option>
                </select>
                <select id="strategy">
                    <option value="Scalp">⚡ Scalp</option>
                    <option value="Swing">🌊 Swing</option>
                    <option value="Breakout">💥 Breakout</option>
                    <option value="Trend">📈 Trend</option>
                </select>
            </div>
            <button onclick="saveTrade()" class="add-btn">Log Trade</button>
        </section>

        <div class="list-controls">
            <h3>Recent History</h3>
            <input type="text" id="search" placeholder="Search strategy or firm..." onkeyup="render()">
        </div>

        <section class="journal-wrapper" id="journalList"></section>
    </div>

    <script src="app.js"></script>
</body>
</html>
