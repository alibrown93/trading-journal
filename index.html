<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TradeLog Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="glass-container">
        <header>
            <h1>TradeLog</h1>
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="label">Win Rate</span>
                    <span id="win-rate" class="value">0%</span>
                </div>
                <div class="stat-card">
                    <span class="label">Total P&L</span>
                    <span id="total-pnl" class="value">$0</span>
                </div>
            </div>
        </header>

        <section class="input-group">
            <input type="text" id="pair" placeholder="Asset (e.g. BTC/USDT)">
            <div class="row">
                <input type="number" id="pnl" placeholder="P&L ($)">
                <select id="strategy">
                    <option value="Scalp">Scalp</option>
                    <option value="Swing">Swing</option>
                    <option value="Breakout">Breakout</option>
                    <option value="Trend">Trend</option>
                </select>
            </div>
            <button onclick="saveTrade()" class="main-btn">Log Trade</button>
        </section>

        <div class="divider"></div>

        <section class="journal-wrapper" id="journalList">
            </section>
        
        <button onclick="clearJournal()" class="clear-btn">Clear All Data</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
