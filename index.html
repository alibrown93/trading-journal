<div class="container">
  <h1>Trading Journal</h1>

  <div class="card-grid">
    <div class="card"><h3>Win Rate</h3><p id="winRateCard">0%</p></div>
    <div class="card"><h3>Total PnL</h3><p id="totalPnlCard">$0.00</p></div>
    <div class="card"><h3>Best Trade</h3><p id="bestTradeCard">$0.00</p></div>
  </div>

  <form id="trade-form">
    <input type="date" id="date" required />
    <input type="text" id="ticker" placeholder="Ticker" required />
    <select id="prop-firm" required>
      <option value="" disabled selected>Select Prop Firm</option>
      <optgroup label="Popular Firms">
        <option value="FTMO">FTMO</option>
        <option value="Apex">Apex Trader Funding</option>
        <option value="Topstep">Topstep</option>
        <option value="Funding Pips">Funding Pips</option>
        <option value="The 5%ers">The 5%ers</option>
      </optgroup>
    </select>
    <input type="number" id="entry" placeholder="Entry" step="0.01" required />
    <input type="number" id="exit" placeholder="Exit" step="0.01" required />
    <button type="submit">Add Trade</button>
  </form>
  
  <canvas id="pnlChart"></canvas>
  
  <table id="trade-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Firm</th>
        <th>Ticker</th>
        <th>PnL</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody id="trade-table-body"></tbody>
  </table>
</div>
